services:
  db:
    image: mysql:8.4
    # REMOVED: The legacy command that was crashing MySQL 8.4
    environment:
      MYSQL_DATABASE: appraisehub
      MYSQL_USER: appraisehub
      MYSQL_PASSWORD: appraisehub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
    environment:
      SPRING_CONFIG_LOCATION: file:/app/application.properties
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/appraisehub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: appraisehub
      SPRING_DATASOURCE_PASSWORD: appraisehub
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
    volumes:
      - ./application.properties:/app/application.properties:ro
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
